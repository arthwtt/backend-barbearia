<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel do Barbeiro - BARBER.io">
    <title>BARBER.io - Painel do Barbeiro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header barber-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">Painel do Barbeiro</div>
                <div class="user-info">
                    <a href="admin.html" class="btn-login">Administracao</a>
                    <a href="#" class="btn-login" id="logoutButton">Sair</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <section class="barber-section dashboard-section">
                <h2 class="barber-section-title">Painel</h2>
                <div class="dashboard-cards">
                    <div class="dashboard-card">
                        <div class="card-title">Agendamentos</div>
                        <div class="card-value" id="appointmentsCount">-</div>
                    </div>
                    <div class="dashboard-card">
                        <div class="card-title">Faturamento</div>
                        <div class="card-value" id="dailyRevenue">R$ 0,00</div>
                    </div>
                  
                </div>
            </section>

            <section class="barber-section schedule-section">
                <h2 class="barber-section-title">Agenda de Hoje</h2>
                <p id="barberScheduleMessage" style="min-height: 20px; margin-bottom: 10px; color: #ff6b6b;"></p>
                <div class="schedule-grid" id="scheduleGrid">
                    <div class="time-slot header">Horario</div>
                    <div class="event-slot header">Agendamento</div>
                </div>
            </section>

            <section class="barber-section finance-section">
                <h2 class="barber-section-title">Resumo Financeiro</h2>
                <div class="financial-summary">
                    <p>Total do dia: <span class="total" id="financialTotal">R$ 0,00</span></p>
                </div>
            </section>
        </div>
    </main>

    <script>
        (function setupBarberPageAuth() {
            const API_BASE_URL = localStorage.getItem('apiBaseUrl') || 'http://localhost:3000';

            function normalizeUserType(type) {
                const value = String(type || '').toLowerCase();
                if (value === 'barbeiro' || value === 'barber') return 'barber';
                if (value === 'cliente' || value === 'client') return 'client';
                return value;
            }

            function setScheduleMessage(message, isError) {
                const messageElement = document.getElementById('barberScheduleMessage');
                if (!messageElement) return;
                messageElement.textContent = message || '';
                messageElement.style.color = isError ? '#ff6b6b' : '#7ed957';
            }

            function formatCurrency(value) {
                return 'R$ ' + Number(value || 0).toFixed(2).replace('.', ',');
            }

            function formatDateISO(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return year + '-' + month + '-' + day;
            }

            function buildDaySlots(startHour, endHour, stepMinutes) {
                const slots = [];
                const cursor = new Date();
                cursor.setHours(startHour, 0, 0, 0);

                const end = new Date(cursor);
                end.setHours(endHour, 0, 0, 0);

                while (cursor < end) {
                    const hours = String(cursor.getHours()).padStart(2, '0');
                    const minutes = String(cursor.getMinutes()).padStart(2, '0');
                    slots.push(hours + ':' + minutes);
                    cursor.setMinutes(cursor.getMinutes() + stepMinutes);
                }

                return slots;
            }

            function extractHHMM(value) {
                if (!value) return null;

                const raw = String(value);
                if (/[zZ]$|[+\-]\d{2}:\d{2}$/.test(raw)) {
                    const parsedWithTz = new Date(raw);
                    if (!Number.isNaN(parsedWithTz.getTime())) {
                        const localHours = String(parsedWithTz.getHours()).padStart(2, '0');
                        const localMinutes = String(parsedWithTz.getMinutes()).padStart(2, '0');
                        return localHours + ':' + localMinutes;
                    }
                }

                const isoMatch = raw.match(/T(\d{2}:\d{2})/);
                if (isoMatch) return isoMatch[1];

                const sqlMatch = raw.match(/ (\d{2}:\d{2})/);
                if (sqlMatch) return sqlMatch[1];

                const parsed = new Date(value);
                if (Number.isNaN(parsed.getTime())) return null;

                const hours = String(parsed.getHours()).padStart(2, '0');
                const minutes = String(parsed.getMinutes()).padStart(2, '0');
                return hours + ':' + minutes;
            }

            function mapAppointmentsByTime(appointments) {
                return appointments.reduce(function (acc, appointment) {
                    const key = extractHHMM(appointment.start_at);
                    if (key) acc[key] = appointment;
                    return acc;
                }, {});
            }

            function buildEventText(appointment) {
                if (!appointment) return '';
                const clientName = appointment.client && appointment.client.name ? appointment.client.name : 'Cliente';
                const serviceName = appointment.service && appointment.service.name ? appointment.service.name : 'Servico';
                const price = appointment.service && appointment.service.price != null
                    ? ' (' + formatCurrency(appointment.service.price) + ')'
                    : '';
                return clientName + ' - ' + serviceName + price;
            }

            function renderSchedule(appointments) {
                const grid = document.getElementById('scheduleGrid');
                if (!grid) return;

                const byTime = mapAppointmentsByTime(appointments);
                const slots = buildDaySlots(8, 18, 30);
                const rows = [
                    '<div class="time-slot header">Horario</div>',
                    '<div class="event-slot header">Agendamento</div>'
                ];

                slots.forEach(function (slot) {
                    const appointment = byTime[slot];
                    rows.push('<div class="time-slot">' + slot + '</div>');
                    rows.push('<div class="event-slot ' + (appointment ? 'event-slot-booked' : 'event-slot-empty') + '">' + buildEventText(appointment) + '</div>');
                });

                grid.innerHTML = rows.join('');
            }

            function updateSummary(appointments) {
                const appointmentsCount = document.getElementById('appointmentsCount');
                const dailyRevenue = document.getElementById('dailyRevenue');
                const financialTotal = document.getElementById('financialTotal');

                const total = appointments.reduce(function (sum, item) {
                    return sum + Number(item.service && item.service.price ? item.service.price : 0);
                }, 0);

                if (appointmentsCount) appointmentsCount.textContent = String(appointments.length);
                if (dailyRevenue) dailyRevenue.textContent = formatCurrency(total);
                if (financialTotal) financialTotal.textContent = formatCurrency(total);
            }

            async function fetchAppointmentsForToday(token) {
                const today = formatDateISO(new Date());
                const response = await fetch(API_BASE_URL + '/appointments?date=' + today, {
                    headers: {
                        Authorization: 'Bearer ' + token
                    }
                });

                const data = await response.json().catch(function () { return []; });
                if (!response.ok) {
                    const errorMessage = data && data.error ? data.error : 'Erro ao carregar agenda.';
                    throw new Error(errorMessage);
                }

                return Array.isArray(data) ? data : [];
            }

            async function loadRealSchedule(token) {
                setScheduleMessage('Carregando agenda de hoje...', false);
                try {
                    const appointments = await fetchAppointmentsForToday(token);
                    renderSchedule(appointments);
                    updateSummary(appointments);

                    if (!appointments.length) {
                        setScheduleMessage('Nenhum agendamento para hoje.', false);
                        return;
                    }

                    setScheduleMessage('', false);
                } catch (error) {
                    renderSchedule([]);
                    updateSummary([]);
                    setScheduleMessage(error.message || 'Falha ao carregar agenda.', true);
                }
            }

            let user = null;
            const token = localStorage.getItem('authToken');
            try {
                user = JSON.parse(localStorage.getItem('authUser') || 'null');
            } catch (err) {
                localStorage.removeItem('authUser');
            }

            if (!token || !user) {
                window.location.href = 'login.html';
                return;
            }

            const role = normalizeUserType(user.type);
            if (role !== 'barber') {
                window.location.href = 'index.html';
                return;
            }

            loadRealSchedule(token);

            const logoutButton = document.getElementById('logoutButton');
            logoutButton.addEventListener('click', function (e) {
                e.preventDefault();
                localStorage.removeItem('authToken');
                localStorage.removeItem('authUser');
                window.location.href = 'login.html';
            });
        })();
    </script>
</body>
</html>
